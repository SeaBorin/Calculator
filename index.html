<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <form action="">
          <div class="display-container">
            <input type="text" name="display" readonly />
          </div>
          <div class="first-row all-row">
            <input
              type="button"
              value="AC"
              class="special-operator"
              onclick="display.value = ''"
            />
            <input
              type="button"
              value="DE"
              class="special-operator"
              onclick="display.value = display.value.toString().slice(0, -1)"
              -
            />
            <input
              type="button"
              value="%"
              class="special-operator"
              onclick="display.value += '%'"
            />
            <input
              type="button"
              value="/"
              class="special-operator"
              onclick="display.value += '/'"
            />
          </div>
          <div class="second-row all-row">
            <input
              type="button"
              value="7"
              class="normal-operator"
              onclick="display.value += '7'"
            />
            <input
              type="button"
              value="8"
              class="normal-operator"
              onclick="display.value += '8'"
            />
            <input
              type="button"
              value="9"
              class="normal-operator"
              onclick="display.value += '9'"
            />
            <input
              type="button"
              value="*"
              class="special-operator"
              onclick="display.value += '*'"
            />
          </div>
          <div class="third-row all-row">
            <input
              type="button"
              value="4"
              class="normal-operator"
              onclick="display.value += '4'"
            />
            <input
              type="button"
              value="5"
              class="normal-operator"
              onclick="display.value += '5'"
            />
            <input
              type="button"
              value="6"
              class="normal-operator"
              onclick="display.value += '6'"
            />
            <input
              type="button"
              value="-"
              class="special-operator"
              onclick="display.value += '-'"
            />
          </div>
          <div class="fourth-row all-row">
            <input
              type="button"
              value="1"
              class="normal-operator"
              onclick="display.value += '1'"
            />
            <input
              type="button"
              value="2"
              class="normal-operator"
              onclick="display.value += '2'"
            />
            <input
              type="button"
              value="3"
              class="normal-operator"
              onclick="display.value += '3'"
            />
            <input
              type="button"
              value="+"
              class="special-operator"
              class="operator"
              onclick="display.value += '+'"
            />
          </div>
          <div class="fifth-row all-row">
            <input
              type="button"
              value="00"
              class="normal-operator"
              onclick="display.value += '00'"
            />
            <input
              type="button"
              value="0"
              class="normal-operator"
              onclick="display.value += '0'"
            />
            <input
              type="button"
              value="."
              class="special-operator"
              onclick="display.value += '.'"
            />
            <input
              type="button"
              value="="
              class="special-operator"
              onclick="display.value = eval(display.value)"
            />
          </div>
        </form>
      </div>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
